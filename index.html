<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Pomodoro Timer</title>
    <meta name="description" content="A premium, aesthetic Pomodoro timer to boost your productivity. Minimalist design with dark/light modes.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
            <i class="fas fa-sun"></i>
        </button>
        
        <header>
            <h1>Focus</h1>
            <p id="mode-text">Time to work</p>
        </header>
        
        <main>
            <div class="timer-container">
                <svg class="progress-ring" width="300" height="300">
                    <circle class="progress-ring__circle_bg" stroke-width="8" fill="transparent" r="140" cx="150" cy="150"/>
                    <circle class="progress-ring__circle" stroke-width="8" fill="transparent" r="140" cx="150" cy="150"/>
                </svg>
                <div class="time-display" id="time-display">25:00</div>
            </div>
            
            <div class="controls">
                <button id="btn-work" class="mode-btn active" data-time="25">Work</button>
                <button id="btn-short-break" class="mode-btn" data-time="5">Short Break</button>
                <button id="btn-long-break" class="mode-btn" data-time="15">Long Break</button>
            </div>
            
            <div class="actions">
                <button id="btn-play-pause" class="action-btn play-btn" aria-label="Play/Pause">
                    <i class="fas fa-play"></i>
                </button>
                <button id="btn-reset" class="action-btn" aria-label="Reset">
                    <i class="fas fa-redo"></i>
                </button>
            </div>
        </main>
        
        <!-- Maintain Disqus -->
        <hr class="divider">
        <div class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = 'https://danielchoichoi.github.io/TEST/';  
                    this.page.identifier = 'pomodoro-timer-main'; 
                };
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://test1-rvs7luaqe2.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <!-- Notification sound (silently embedded) -->
    <audio id="bell-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
